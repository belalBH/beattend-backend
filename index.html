    <style>
      body {
        font-family: 'Tajawal', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #050B1F; /* Midnight Navy */
        /* Dynamic premium organic backdrop gradient blobs matching deep navy theme */
        background-image: 
          radial-gradient(circle at 10% 20%, rgba(6, 182, 212, 0.15) 0%, transparent 45%),
          radial-gradient(circle at 90% 10%, rgba(37, 99, 235, 0.15) 0%, transparent 45%),
          radial-gradient(circle at 80% 80%, rgba(20, 42, 82, 0.25) 0%, transparent 45%),
          radial-gradient(circle at 25% 75%, rgba(6, 182, 212, 0.10) 0%, transparent 45%);
        background-attachment: fixed;
        color: #F8FAFC; /* Slate-50 default text */
        overflow: hidden;
      }
      #root {
        height: 100vh;
      }
      /* Premium Apple light frosted glassmorphism utility classes */
      .glass-panel {
        background-color: rgba(11, 22, 51, 0.75) !important;
        background: rgba(11, 22, 51, 0.75) !important; /* Dark Navy (#0B1633) Translucent */
        backdrop-filter: blur(40px) saturate(200%) !important;
        -webkit-backdrop-filter: blur(40px) saturate(200%) !important;
        border: 1px solid rgba(255, 255, 255, 0.06) !important;
        box-shadow: 
          0 30px 60px -15px rgba(0, 0, 0, 0.6), 
          inset 0 1px 0px 0px rgba(255, 255, 255, 0.08) !important;
      }
      .glass-card {
        background-color: rgba(16, 32, 64, 0.70) !important;
        background: rgba(16, 32, 64, 0.70) !important; /* Dark Blue (#102040) Translucent */
        backdrop-filter: blur(25px) saturate(180%) !important;
        -webkit-backdrop-filter: blur(25px) saturate(180%) !important;
        border: 1px solid rgba(255, 255, 255, 0.07) !important;
        border-radius: 1.5rem !important; /* 24px rounded corners */
        box-shadow: 
          0 20px 45px -10px rgba(0, 0, 0, 0.45), 
          inset 0 1px 0px 0px rgba(255, 255, 255, 0.06) !important;
        color: #FFFFFF !important;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .glass-card:hover {
        background-color: rgba(20, 42, 82, 0.85) !important;
        background: rgba(20, 42, 82, 0.85) !important; /* Glowing Deep Blue (#142A52) on hover */
        border-color: rgba(6, 182, 212, 0.4) !important;
        box-shadow: 
          0 30px 60px -10px rgba(0, 0, 0, 0.65), 
          inset 0 1px 0px 0px rgba(255, 255, 255, 0.12), 
          0 0 30px rgba(6, 182, 212, 0.25) !important;
        transform: translateY(-4px) scale(1.01);
      }
      .glass-input {
        background: rgba(5, 11, 31, 0.8) !important; /* Midnight Navy (#050B1F) inset */
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        color: #FFFFFF !important;
        backdrop-filter: blur(15px) !important;
        box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.3) !important;
        border-radius: 0.75rem !important;
      }
      .glass-input:focus {
        border-color: #06B6D4 !important;
        background: rgba(5, 11, 31, 0.95) !important;
        outline: none;
        box-shadow: 0 0 15px rgba(6, 182, 212, 0.3) !important;
      }
      .purple-glow {
        box-shadow: 0 8px 24px 0 rgba(6, 182, 212, 0.2);
      }
      .purple-gradient {
        background: linear-gradient(135deg, #7C3AED 0%, #06B6D4 100%);
      }
      /* Custom scrollbar for dark modern SaaS */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.01);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(6, 182, 212, 0.5);
      }
      /* Global Dark Mode -> Glassmorphism overrides */
      .bg-white {
        background-color: rgba(16, 32, 64, 0.70) !important;
        background: rgba(16, 32, 64, 0.70) !important; /* Dark Blue (#102040) Translucent */
        backdrop-filter: blur(25px) saturate(180%) !important;
        -webkit-backdrop-filter: blur(25px) saturate(180%) !important;
        border: 1px solid rgba(255, 255, 255, 0.07) !important;
        border-radius: 1.5rem !important; /* 24px rounded corners */
        box-shadow: 
          0 20px 45px -10px rgba(0, 0, 0, 0.45), 
          inset 0 1px 0px 0px rgba(255, 255, 255, 0.06) !important;
        color: #FFFFFF !important;
      }
      .text-gray-900 {
        color: #FFFFFF !important;
      }
      .text-gray-700 {
        color: #F1F5F9 !important;
      }
      .text-gray-600 {
        color: #E2E8F0 !important;
      }
      .text-gray-500 {
        color: #CBD5E1 !important;
      }
      .text-gray-400 {
        color: #94A3B8 !important;
      }
      .border-gray-100, .border-gray-50, .border-white\/5, .border-white\/10 {
        border-color: rgba(255, 255, 255, 0.08) !important;
      }
      .bg-gray-50 {
        background: rgba(255, 255, 255, 0.02) !important;
        border-color: rgba(255, 255, 255, 0.08) !important;
      }
      .bg-gray-100 {
        background: rgba(255, 255, 255, 0.04) !important;
      }
      input[type="text"], input[type="password"], input[type="number"], input[type="date"], select, textarea {
        background: rgba(5, 11, 31, 0.8) !important; /* Midnight Navy (#050B1F) inset */
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        color: #FFFFFF !important;
        border-radius: 0.75rem !important;
        backdrop-filter: blur(15px) !important;
        box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.3) !important;
        transition: all 0.3s ease;
      }
      input:focus, select:focus, textarea:focus {
        border-color: #06B6D4 !important;
        background: rgba(5, 11, 31, 0.95) !important;
        box-shadow: 0 0 15px rgba(6, 182, 212, 0.3) !important;
      }
      [class*="text-[#15385E]"], 
      [class*="text-[#17AE9F]"] {
        color: #06B6D4 !important; /* Secondary Cyan */
        text-shadow: 0 0 10px rgba(6, 182, 212, 0.3) !important;
      }
      [class*="bg-[#15385E]"], 
      [class*="bg-[#17AE9F]"] {
        background: linear-gradient(135deg, #7C3AED 0%, #06B6D4 100%) !important;
        color: #ffffff !important;
        font-weight: 800 !important;
        border: 1px solid rgba(255, 255, 255, 0.25) !important;
        box-shadow: 
          0 10px 25px -5px rgba(124, 58, 237, 0.35), 
          inset 0 1px 0px rgba(255, 255, 255, 0.25) !important;
        transition: all 0.3s ease !important;
      }
      [class*="bg-[#15385E]"]:hover, 
      [class*="bg-[#17AE9F]"]:hover {
        background: linear-gradient(135deg, #06B6D4 0%, #7C3AED 100%) !important;
        box-shadow: 
          0 15px 30px -5px rgba(6, 182, 212, 0.45), 
          inset 0 1px 0px rgba(255, 255, 255, 0.3) !important;
        transform: translateY(-1px);
      }
      [class*="border-[#17AE9F]"],
      [class*="border-[#15385E]"] {
        border-color: rgba(124, 58, 237, 0.2) !important;
      }
      [class*="bg-[#E8F7F5]"], 
      [class*="bg-[#EBF2FA]"], 
      [class*="bg-[#E6F6F4]"] {
        background-color: rgba(124, 58, 237, 0.15) !important;
        color: #06B6D4 !important;
      }
      [class*="ring-[#15385E]"] {
        --tw-ring-color: rgba(124, 58, 237, 0.3) !important;
      }
      [class*="shadow-[#15385E]"] {
        box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.35) !important;
      }
      /* Ensure Google Maps buttons look good in RTL */
      .gm-style {
        direction: ltr;
      }
    </style>

</script>
