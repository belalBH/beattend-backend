    <style>
      body {
        font-family: 'Tajawal', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #0B0E14; /* Matte Dark Slate */
        /* Dynamic liquid glass backdrop gradient blobs */
        background-image: 
          radial-gradient(circle at 15% 15%, rgba(37, 99, 235, 0.15) 0%, transparent 45%),
          radial-gradient(circle at 85% 20%, rgba(0, 245, 212, 0.12) 0%, transparent 45%),
          radial-gradient(circle at 80% 80%, rgba(99, 102, 241, 0.10) 0%, transparent 45%),
          radial-gradient(circle at 25% 75%, rgba(16, 185, 129, 0.08) 0%, transparent 45%);
        background-attachment: fixed;
        color: #f3f4f6;
        overflow: hidden;
      }
      #root {
        height: 100vh;
      }
      /* Premium Apple dark frosted glassmorphism utility classes */
      .glass-panel {
        background-color: #0B0F19 !important; /* Abyssal Slate fallback */
        background: rgba(13, 17, 26, 0.70) !important; /* Semi-transparent dark glass */
        backdrop-filter: blur(30px) saturate(180%) !important;
        -webkit-backdrop-filter: blur(30px) saturate(180%) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        box-shadow: 
          inset 1px 1px 0px 0px rgba(255, 255, 255, 0.08), 
          8px 8px 24px rgba(0, 0, 0, 0.4), 
          -8px -8px 24px rgba(255, 255, 255, 0.02) !important;
      }
      .glass-card {
        background-color: #141A26 !important; /* Steel glass fallback */
        background: rgba(20, 26, 38, 0.55) !important; /* Steel Glass */
        backdrop-filter: blur(24px) saturate(180%) !important;
        -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
        border: 1px solid rgba(255, 255, 255, 0.06) !important;
        border-radius: 1.25rem !important;
        box-shadow: 
          inset 1px 1px 0px 0px rgba(255, 255, 255, 0.06),
          8px 8px 20px rgba(0, 0, 0, 0.35), 
          -8px -8px 20px rgba(255, 255, 255, 0.02) !important;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .glass-card:hover {
        background: rgba(20, 26, 38, 0.65) !important;
        border-color: rgba(255, 255, 255, 0.12) !important;
        box-shadow: 
          inset 1px 1px 0px 0px rgba(255, 255, 255, 0.12),
          12px 12px 28px rgba(0, 0, 0, 0.45), 
          -12px -12px 28px rgba(255, 255, 255, 0.04),
          0 0 15px rgba(0, 245, 212, 0.1) !important;
        transform: translateY(-2px);
      }
      .glass-input {
        background: rgba(8, 10, 16, 0.70) !important; /* Deep inset well */
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        color: #fff !important;
        backdrop-filter: blur(10px) !important;
        box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.4) !important;
      }
      .glass-input:focus {
        border-color: rgba(37, 99, 235, 0.8) !important;
        background: rgba(8, 10, 16, 0.85) !important;
        outline: none;
        box-shadow: inset 1px 1px 3px rgba(0, 0, 0, 0.4), 0 0 15px rgba(37, 99, 235, 0.25) !important;
      }
      .purple-glow {
        box-shadow: 0 0 30px rgba(37, 99, 235, 0.25);
      }
      .purple-gradient {
        background: linear-gradient(135deg, rgba(37, 99, 235, 0.85) 0%, rgba(0, 245, 212, 0.85) 100%);
      }
      /* Custom scrollbar for dark modern SaaS */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.01);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(37, 99, 235, 0.4);
      }
      /* Global Dark Mode SaaS overrides */
      .bg-white {
        background-color: #141A26 !important; /* Card fallback */
        background: rgba(20, 26, 38, 0.55) !important; /* Card Glass */
        backdrop-filter: blur(24px) saturate(180%) !important;
        -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
        border: 1px solid rgba(255, 255, 255, 0.06) !important;
        border-radius: 1.25rem !important;
        box-shadow: 
          inset 1px 1px 0px 0px rgba(255, 255, 255, 0.06),
          8px 8px 20px rgba(0, 0, 0, 0.35), 
          -8px -8px 20px rgba(255, 255, 255, 0.02) !important;
        color: #f3f4f6 !important;
      }
      .text-gray-900 {
        color: #ffffff !important;
      }
      .text-gray-700 {
        color: #e5e7eb !important;
      }
      .text-gray-600 {
        color: #d1d5db !important;
      }
      .text-gray-500 {
        color: #9ca3af !important;
      }
      .text-gray-400 {
        color: #8a99ad !important;
      }
      .border-gray-100, .border-gray-50 {
        border-color: rgba(255, 255, 255, 0.05) !important;
      }
      .bg-gray-50 {
        background: rgba(255, 255, 255, 0.01) !important;
        border-color: rgba(255, 255, 255, 0.05) !important;
      }
      .bg-gray-100 {
        background: rgba(255, 255, 255, 0.03) !important;
      }
      input[type="text"], input[type="password"], input[type="number"], input[type="date"], select, textarea {
        background: rgba(8, 10, 16, 0.70) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        color: #fff !important;
        border-radius: 0.75rem !important;
        backdrop-filter: blur(10px) !important;
        box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.4) !important;
        transition: all 0.3s ease;
      }
      input:focus, select:focus, textarea:focus {
        border-color: rgba(37, 99, 235, 0.8) !important;
        background: rgba(8, 10, 16, 0.85) !important;
        box-shadow: inset 1px 1px 3px rgba(0, 0, 0, 0.4), 0 0 15px rgba(37, 99, 235, 0.25) !important;
      }
      [class*="text-[#15385E]"], 
      [class*="text-[#17AE9F]"] {
        color: #00F5D4 !important;
        text-shadow: 0 0 10px rgba(0, 245, 212, 0.15);
      }
      [class*="bg-[#15385E]"], 
      [class*="bg-[#17AE9F]"] {
        background: linear-gradient(135deg, rgba(37, 99, 235, 0.85) 0%, rgba(0, 245, 212, 0.85) 100%) !important;
        color: #ffffff !important;
        font-weight: 800 !important;
        border: 1px solid rgba(255, 255, 255, 0.12) !important;
        box-shadow: 
          4px 4px 12px rgba(0, 0, 0, 0.3), 
          -4px -4px 12px rgba(255, 255, 255, 0.01),
          inset 1px 1px 0px rgba(255, 255, 255, 0.15) !important;
        transition: all 0.3s ease !important;
      }
      [class*="bg-[#15385E]"]:hover, 
      [class*="bg-[#17AE9F]"]:hover {
        background: linear-gradient(135deg, rgba(0, 245, 212, 0.85) 0%, rgba(37, 99, 235, 0.85) 100%) !important;
        box-shadow: 
          6px 6px 16px rgba(0, 0, 0, 0.35), 
          -6px -6px 16px rgba(255, 255, 255, 0.02),
          inset 1px 1px 0px rgba(255, 255, 255, 0.20) !important;
        transform: translateY(-1px);
      }
      [class*="border-[#17AE9F]"],
      [class*="border-[#15385E]"] {
        border-color: rgba(37, 99, 235, 0.3) !important;
      }
      [class*="bg-[#E8F7F5]"], 
      [class*="bg-[#EBF2FA]"], 
      [class*="bg-[#E6F6F4]"] {
        background-color: rgba(37, 99, 235, 0.12) !important;
        color: #00F5D4 !important;
      }
      [class*="ring-[#15385E]"] {
        --tw-ring-color: rgba(37, 99, 235, 0.3) !important;
      }
      [class*="shadow-[#15385E]"] {
        box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.2) !important;
      }
      /* Ensure Google Maps buttons look good in RTL */
      .gm-style {
        direction: ltr;
      }
    </style>

}
</script>
